services:
  postgres:
    image: postgres:16-alpine
    container_name: esign-workflow-postgres
    environment:
      POSTGRES_USER: esign
      POSTGRES_PASSWORD: esign
      POSTGRES_DB: esign_workflow
    ports:
      - "5432:5432"
    volumes:
      - esign-postgres-data:/var/lib/postgresql/data

volumes:
  esign-postgres-data:
